<!DOCTYPE html>
<html lang="kg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керемет талаасы - Поле чудес</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-modal { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- БАЗА ДАННЫХ СЛОВ ---
        const wordsDatabase = [
            {
                kg: { word: "ТҮНДҮК", hint: "Боз үйдүн төбөсүндөгү тегерек алкак", category: "Боз үй" },
                ru: { word: "ТҮНДҮК", hint: "Круглый венец на вершине юрты", category: "Юрта" }
            },
            {
                kg: { word: "БОЗҮЙ", hint: "Көчмөндөрдүн салттуу турак жайы", category: "Турак жай" },
                ru: { word: "БОЗҮЙ", hint: "Традиционное жилище кочевников", category: "Жилище" }
            },
            {
                kg: { word: "КОМУЗ", hint: "Кыргыздын үч кылдуу музыкалык аспабы", category: "Музыка" },
                ru: { word: "КОМУЗ", hint: "Кыргызский трехструнный музыкальный инструмент", category: "Музыка" }
            },
            {
                kg: { word: "МАНАС", hint: "Дүйнөдөгү эң чоң залкар эпос", category: "Эпос" },
                ru: { word: "МАНАС", hint: "Величайший эпос в мире", category: "Эпос" }
            },
            {
                kg: { word: "КАЛПАК", hint: "Кыргыздын улуттук эркек баш кийими", category: "Кийим" },
                ru: { word: "КАЛПАК", hint: "Национальный мужской головной убор", category: "Одежда" }
            },
            {
                kg: { word: "БЕШБАРМАК", hint: "Эт менен камырдан жасалган сый тамак", category: "Тамак-аш" },
                ru: { word: "БЕШБАРМАК", hint: "Почетное блюдо из мяса и теста", category: "Еда" }
            },
            {
                kg: { word: "КӨКБӨРҮ", hint: "Ат үстүндөгү улуттук оюн", category: "Спорт" },
                ru: { word: "КӨКБӨРҮ", hint: "Национальная конная игра", category: "Спорт" }
            },
            {
                kg: { word: "ЫСЫККӨЛ", hint: "Кыргызстандын бермети, тоңбогон көл", category: "География" },
                ru: { word: "ЫСЫККӨЛ", hint: "Жемчужина Кыргызстана, незамерзающее озеро", category: "География" }
            },
            {
                kg: { word: "ШЫРДАК", hint: "Оюу түшүрүлгөн кийиз килем", category: "Кол өнөрчүлүк" },
                ru: { word: "ШЫРДАК", hint: "Войлочный ковер с национальными узорами", category: "Ремесло" }
            }
        ];

        const translations = {
            kg: {
                title: "КЕРЕМЕТ ТАЛААСЫ",
                rulesTitle: "Оюндун эрежелери:",
                rules: ["🎯 Сөздөрдү тамгалап тапкыла", "🎡 Упай алуу үчүн барабанды айланткыла", "💀 'Банкрот' секторунан сак болгула", "❤️ Сизде 3 мүмкүнчүлүк бар"],
                startBtn: "Оюнду баштоо",
                exitBtn: "Чыгуу",
                exitTitle: "Чыгууну каалайсызбы?",
                exitText: "Топтогон упайларыңыз сакталбайт!",
                exitYes: "Ооба, чыгуу",
                exitNo: "Жок, улантуу",
                round: "Раунд",
                score: "Упай",
                category: "Категория",
                hint: "Жардам",
                spinBtn: "Барабанды айлант!",
                spinning: "Барабан айланууда...",
                bankrupt: "💀 БАНКРОТ! Упайлар күйдү",
                correct: "✅ ТУУРА!",
                wrong: "❌ КАТА!",
                winRound: "Кезектеги раундга өтөбүз!",
                gameOver: "Оюн бүттү",
                winGame: "КУТТУКТАЙБЫЗ!",
                playAgain: "Кайра ойноо",
                wordWas: "Туура сөз:",
                totalScore: "Жалпы упай"
            },
            ru: {
                title: "ПОЛЕ ЧУДЕС",
                rulesTitle: "Правила игры:",
                rules: ["🎯 Угадывайте слова по буквам", "🎡 Крутите барабан для получения очков", "💀 Избегайте сектора 'Банкрот'", "❤️ У вас есть 3 попытки"],
                startBtn: "Начать игру",
                exitBtn: "Выход",
                exitTitle: "Хотите выйти?",
                exitText: "Ваши набранные очки будут потеряны!",
                exitYes: "Да, выйти",
                exitNo: "Нет, продолжить",
                round: "Раунд",
                score: "Очки",
                category: "Категория",
                hint: "Подсказка",
                spinBtn: "Крутить барабан!",
                spinning: "Барабан крутится...",
                bankrupt: "💀 БАНКРОТ! Очки сгорели",
                correct: "✅ ВЕРНО!",
                wrong: "❌ ОШИБКА!",
                winRound: "Переходим к следующему раунду!",
                gameOver: "Игра окончена",
                winGame: "ПОЗДРАВЛЯЕМ!",
                playAgain: "Играть снова",
                wordWas: "Правильное слово:",
                totalScore: "Итоговый счет"
            }
        };

        const KyrgyzWheelGame = () => {
            const [lang, setLang] = useState('kg');
            const [gameState, setGameState] = useState('menu');
            const [currentWordIndex, setCurrentWordIndex] = useState(0);
            const [guessedLetters, setGuessedLetters] = useState([]);
            const [score, setScore] = useState(0);
            const [round, setRound] = useState(1);
            const [spinning, setSpinning] = useState(false);
            const [wheelValue, setWheelValue] = useState(0);
            const [message, setMessage] = useState('');
            const [lives, setLives] = useState(3);
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [isMuted, setIsMuted] = useState(false);

            const t = translations[lang];
            const currentData = wordsDatabase[currentWordIndex][lang];
            const wheelSegments = [100, 200, 300, 500, 0, 150, 250, 400, 600, 0, 350, 450];
            const keyboard = [['А','Б','В','Г','Д','Е','Ё','Ж','З'],['И','Й','К','Л','М','Н','О','Ө','П'],['Р','С','Т','У','Ү','Ф','Х','Ц','Ч'],['Ш','Щ','Ъ','Ы','Ь','Э','Ю','Я','Ң']];

            const canvasRef = useRef(null);
            
            // Звуковые эффекты
            const audioRefs = {
                spin: useRef(new Audio('https://www.soundjay.com/misc/sounds/bell-ring-01.mp3')),
                win: useRef(new Audio('https://www.soundjay.com/human/sounds/applause-01.mp3')),
                lose: useRef(new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3')),
                correct: useRef(new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3')),
                bankrupt: useRef(new Audio('https://www.soundjay.com/buttons/sounds/button-11.mp3'))
            };

            const playSound = (soundName) => {
                if (!isMuted && audioRefs[soundName].current) {
                    audioRefs[soundName].current.currentTime = 0;
                    audioRefs[soundName].current.play().catch(e => console.log("Audio error"));
                }
            };

            useEffect(() => { if (canvasRef.current && gameState === 'playing') drawWheel(0); }, [gameState]);

            const drawWheel = (rotation) => {
                const canvas = canvasRef.current; if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const centerX = 150, centerY = 150, radius = 140;
                const segmentAngle = (2 * Math.PI) / wheelSegments.length;
                ctx.clearRect(0, 0, 300, 300);

                wheelSegments.forEach((value, i) => {
                    const startAngle = i * segmentAngle + rotation;
                    const endAngle = startAngle + segmentAngle;
                    ctx.beginPath(); ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.fillStyle = value === 0 ? '#1f2937' : (i % 2 === 0 ? '#dc2626' : '#fbbf24');
                    ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(startAngle + segmentAngle / 2);
                    ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Montserrat';
                    ctx.fillText(value === 0 ? '💀' : value, radius * 0.7, 5); ctx.restore();
                });
                ctx.beginPath(); ctx.moveTo(centerX, centerY - radius - 20); ctx.lineTo(centerX - 15, centerY - radius); ctx.lineTo(centerX + 15, centerY - radius); ctx.fillStyle = '#ef4444'; ctx.fill();
            };

            const spinWheel = () => {
                if (spinning) return;
                setSpinning(true); 
                setMessage(t.spinning);
                playSound('spin');

                const spins = 5 + Math.random() * 5;
                const finalRotation = spins * 2 * Math.PI;
                const duration = 3000;
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const currentRotation = finalRotation * (1 - Math.pow(1 - progress, 3));
                    drawWheel(currentRotation);
                    if (progress < 1) requestAnimationFrame(animate);
                    else {
                        const segmentAngle = (2 * Math.PI) / wheelSegments.length;
                        const normalizedRotation = (finalRotation % (2 * Math.PI));
                        const selectedIndex = Math.floor((2 * Math.PI - normalizedRotation + Math.PI / 2) / segmentAngle) % wheelSegments.length;
                        const value = wheelSegments[selectedIndex];
                        setWheelValue(value); setSpinning(false);
                        if (value === 0) {
                            playSound('bankrupt');
                            setMessage(t.bankrupt);
                            setTimeout(() => {
                                setLives(l => l > 1 ? (setWheelValue(0), setMessage(t.spinBtn), l - 1) : (setGameState('gameover'), 0));
                            }, 2000);
                        }
                    }
                };
                animate();
            };

            const startGame = () => {
                setCurrentWordIndex(Math.floor(Math.random() * wordsDatabase.length));
                setGuessedLetters([]); setScore(0); setRound(1); setLives(3); setWheelValue(0); setMessage(t.spinBtn); setGameState('playing'); setShowExitConfirm(false);
            };

            const guessLetter = (letter) => {
                if (guessedLetters.includes(letter) || spinning || wheelValue === 0) return;
                const word = currentData.word;
                const newGuessed = [...guessedLetters, letter];
                setGuessedLetters(newGuessed);

                if (word.includes(letter)) {
                    playSound('correct');
                    const count = word.split('').filter(l => l === letter).length;
                    setScore(s => s + (wheelValue * count));
                    setMessage(t.correct);
                    if (word.split('').every(l => newGuessed.includes(l))) {
                        playSound('win');
                        setTimeout(() => {
                            if (round < 3) {
                                setRound(r => r + 1);
                                setCurrentWordIndex(Math.floor(Math.random() * wordsDatabase.length));
                                setGuessedLetters([]); setWheelValue(0); setMessage(t.winRound);
                            } else setGameState('win');
                        }, 2000);
                    } else { setWheelValue(0); setTimeout(() => setMessage(t.spinBtn), 1000); }
                } else {
                    playSound('lose');
                    setMessage(t.wrong);
                    setLives(l => l > 1 ? (setWheelValue(0), setTimeout(() => setMessage(t.spinBtn), 1000), l - 1) : (setGameState('gameover'), 0));
                }
            };

            // Кнопка звука
            const SoundToggle = () => (
                <button 
                    onClick={() => setIsMuted(!isMuted)} 
                    className="p-3 bg-white/10 hover:bg-white/20 rounded-xl backdrop-blur-md transition-all border border-white/20"
                >
                    {isMuted ? (
                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                        </svg>
                    ) : (
                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    )}
                </button>
            );

            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-800 to-red-800 flex items-center justify-center p-4">
                        <div className="bg-white rounded-[2rem] shadow-2xl p-8 max-w-md w-full text-center border-t-8 border-yellow-400">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex gap-2">
                                    <button onClick={() => setLang('kg')} className={`px-4 py-1 rounded-full text-sm font-bold ${lang === 'kg' ? 'bg-blue-600 text-white' : 'bg-gray-100'}`}>КЫРГЫЗЧА</button>
                                    <button onClick={() => setLang('ru')} className={`px-4 py-1 rounded-full text-sm font-bold ${lang === 'ru' ? 'bg-red-600 text-white' : 'bg-gray-100'}`}>РУССКИЙ</button>
                                </div>
                                <SoundToggle />
                            </div>
                            <h1 className="text-4xl font-black text-gray-800 mb-6 tracking-tighter italic">{t.title}</h1>
                            <div className="bg-orange-50 rounded-2xl p-6 mb-8 text-left border-l-4 border-orange-400">
                                <h3 className="font-bold text-gray-800 mb-3">{t.rulesTitle}</h3>
                                <ul className="space-y-2 text-gray-600 text-sm">
                                    {t.rules.map((r, i) => <li key={i} className="flex gap-2"><span>•</span>{r}</li>)}
                                </ul>
                            </div>
                            <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white py-4 rounded-2xl text-xl font-bold shadow-xl hover:scale-105 transition transform active:scale-95 uppercase">{t.startBtn}</button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'gameover' || gameState === 'win') {
                return (
                    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4">
                        <div className="bg-white rounded-[2.5rem] p-8 max-w-md w-full text-center">
                            <div className="text-7xl mb-4">{gameState === 'win' ? '🏆' : '💀'}</div>
                            <h1 className={`text-4xl font-black mb-4 ${gameState === 'win' ? 'text-green-600' : 'text-red-600'}`}>{gameState === 'win' ? t.winGame : t.gameOver}</h1>
                            <p className="text-gray-600 mb-2">{t.wordWas}</p>
                            <div className="text-3xl font-black text-indigo-900 mb-6 tracking-widest">{wordsDatabase[currentWordIndex][lang].word}</div>
                            <div className="bg-indigo-50 rounded-2xl p-6 mb-8">
                                <div className="text-5xl font-black text-indigo-600">{score}</div>
                                <div className="text-sm font-bold text-indigo-400 uppercase">{t.totalScore}</div>
                            </div>
                            <button onClick={startGame} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition">{t.playAgain}</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-indigo-950 p-4 relative overflow-hidden flex flex-col items-center">
                    {showExitConfirm && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full animate-modal text-center">
                                <h2 className="text-2xl font-black text-gray-800 mb-2">{t.exitTitle}</h2>
                                <p className="text-gray-500 mb-8">{t.exitText}</p>
                                <button onClick={() => setGameState('menu')} className="w-full py-4 bg-red-600 text-white font-bold rounded-xl mb-3">{t.exitYes}</button>
                                <button onClick={() => setShowExitConfirm(false)} className="w-full py-4 bg-gray-100 text-gray-600 font-bold rounded-xl">{t.exitNo}</button>
                            </div>
                        </div>
                    )}

                    <div className="w-full max-w-4xl">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex gap-2">
                                <button onClick={() => setShowExitConfirm(true)} className="bg-white/10 hover:bg-white/20 text-white px-5 py-2 rounded-xl font-bold backdrop-blur-md transition">{t.exitBtn}</button>
                                <SoundToggle />
                            </div>
                            <div className="flex gap-2">
                                {[...Array(3)].map((_, i) => <span key={i} className={`text-2xl transition-opacity duration-500 ${i < lives ? 'opacity-100' : 'opacity-20'}`}>❤️</span>)}
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl p-6 md:p-10">
                            <div className="flex justify-between items-end mb-8">
                                <div>
                                    <div className="text-xs font-bold text-gray-400 uppercase tracking-tighter">{t.round}</div>
                                    <div className="text-3xl font-black text-indigo-600">{round} / 3</div>
                                </div>
                                <div className="text-right">
                                    <div className="text-4xl font-black text-orange-500">{score}</div>
                                    <div className="text-xs font-bold text-gray-400 uppercase tracking-tighter">{t.score}</div>
                                </div>
                            </div>

                            <div className="bg-indigo-50 border-2 border-indigo-100 rounded-3xl p-6 mb-8 text-center">
                                <div className="text-xs font-black text-indigo-300 uppercase mb-1">{t.category}: {currentData.category}</div>
                                <div className="text-xl font-bold text-indigo-900 italic">" {currentData.hint} "</div>
                            </div>

                            <div className="flex justify-center gap-2 mb-10 flex-wrap">
                                {currentData.word.split('').map((letter, index) => (
                                    <div key={index} className={`w-10 h-14 md:w-14 md:h-20 rounded-xl flex items-center justify-center border-b-8 transition-all duration-500 ${guessedLetters.includes(letter) ? 'bg-indigo-600 border-indigo-800 scale-100' : 'bg-gray-200 border-gray-300'}`}>
                                        <span className={`text-2xl md:text-4xl font-black text-white ${guessedLetters.includes(letter) ? 'opacity-100' : 'opacity-0'}`}>{letter}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="flex flex-col lg:flex-row items-center justify-around gap-10">
                                <div className="relative">
                                    <canvas ref={canvasRef} width="300" height="300" className="drop-shadow-2xl"></canvas>
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-lg"></div>
                                </div>

                                <div className="flex flex-col items-center gap-6 w-full max-w-sm">
                                    <button onClick={spinWheel} disabled={spinning || wheelValue !== 0} 
                                        className={`w-full py-5 rounded-[1.5rem] text-xl font-black shadow-xl transition transform active:scale-95 ${spinning || wheelValue !== 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-green-400 to-emerald-600 text-white hover:rotate-1'}`}>
                                        {spinning ? t.spinning : t.spinBtn}
                                    </button>
                                    
                                    <div className={`w-full text-center py-4 rounded-2xl font-black text-lg shadow-inner transition-all ${wheelValue > 0 ? 'bg-yellow-400 text-gray-900 animate-pulse' : 'bg-gray-100 text-indigo-300'}`}>
                                        {message}
                                    </div>

                                    <div className="grid grid-cols-9 gap-1 w-full">
                                        {keyboard.flat().map((letter) => {
                                            const isGuessed = guessedLetters.includes(letter);
                                            const isInWord = currentData.word.includes(letter);
                                            return (
                                                <button key={letter} onClick={() => guessLetter(letter)} disabled={isGuessed || wheelValue === 0 || spinning}
                                                    className={`aspect-square rounded-lg text-sm font-bold transition-all ${isGuessed ? (isInWord ? 'bg-green-500 text-white' : 'bg-red-200 text-red-500') : (wheelValue === 0 || spinning ? 'bg-gray-50 text-gray-200' : 'bg-white border-2 border-gray-100 text-indigo-600 hover:border-indigo-600')}`}>
                                                    {letter}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<KyrgyzWheelGame />, document.getElementById('root'));
    </script>
</body>
</html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }

        /* === MODAL === */
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.7) translateY(40px); }
            70% { transform: scale(1.04) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal { animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* === LOADING SCREEN === */
        @keyframes spinWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(251,191,36,0.3), 0 0 60px rgba(251,191,36,0.08); }
            50% { box-shadow: 0 0 50px rgba(251,191,36,0.9), 0 0 120px rgba(251,191,36,0.4); }
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes letterPop {
            0% { opacity: 0; transform: scale(0) rotate(-15deg); }
            65% { transform: scale(1.2) rotate(4deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes starTwinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.5); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.04); pointer-events: none; }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .spin-wheel { animation: spinWheel 3s cubic-bezier(0.15, 0.85, 0.45, 1) forwards; }
        .pulse-glow { animation: pulseGlow 1.8s ease-in-out infinite; }
        .float-up { animation: floatUp 0.5s ease-out forwards; }
        .letter-pop { animation: letterPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .star-twinkle { animation: starTwinkle ease-in-out infinite; }
        .fade-out { animation: fadeOut 0.7s ease-in forwards; }

        /* === MENU === */
        @keyframes menuSlideIn {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes titleBounce {
            0% { opacity: 0; transform: scale(0.5) rotate(-3deg); }
            60% { transform: scale(1.08) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .menu-card { animation: menuSlideIn 0.6s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }
        .menu-title { animation: titleBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; }
        .menu-bg { background-size: 300% 300%; animation: bgShift 8s ease infinite; }
        .menu-rule-item {
            opacity: 0;
            animation: floatUp 0.4s ease-out forwards;
        }

        /* === GAME PLAYING === */
        @keyframes scorePopup {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); color: #f59e0b; }
            100% { transform: scale(1); }
        }
        @keyframes heartLose {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.5); }
            100% { transform: scale(0.3); opacity: 0.2; }
        }
        @keyframes letterReveal {
            0% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
            60% { transform: rotateY(-10deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }
        @keyframes keyPress {
            0% { transform: scale(1); }
            40% { transform: scale(0.82); }
            100% { transform: scale(1); }
        }
        @keyframes messagePulse {
            0% { transform: scale(0.9); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes spinBtnIdle {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(52,211,153,0); }
        }
        @keyframes wheelGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(99,102,241,0.3)); }
            50% { filter: drop-shadow(0 0 24px rgba(99,102,241,0.7)); }
        }
        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
            33% { transform: translateY(-30px) translateX(20px); opacity: 0.25; }
            66% { transform: translateY(20px) translateX(-15px); opacity: 0.1; }
        }

        .score-pop { animation: scorePopup 0.4s ease-out; }
        .letter-reveal { animation: letterReveal 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }
        .key-press { animation: keyPress 0.15s ease-out; }
        .message-in { animation: messagePulse 0.35s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }
        .spin-btn-idle { animation: spinBtnIdle 2s ease-in-out infinite; }
        .wheel-glow { animation: wheelGlow 2.5s ease-in-out infinite; }
        .float-orb { animation: floatOrb ease-in-out infinite; }

        /* === WIN / GAMEOVER === */
        @keyframes trophyDrop {
            0% { transform: translateY(-80px) rotate(-15deg) scale(0.5); opacity: 0; }
            60% { transform: translateY(10px) rotate(5deg) scale(1.15); }
            80% { transform: translateY(-5px) rotate(-2deg) scale(1.05); }
            100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
        }
        @keyframes endCardIn {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            70% { transform: scale(1.03) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes scoreCount {
            0% { transform: scale(0.5); opacity: 0; color: #6366f1; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

            0%, 100% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-12deg) scale(1.1); }
            40% { transform: rotate(10deg) scale(1.15); }
            60% { transform: rotate(-8deg) scale(1.05); }
            80% { transform: rotate(6deg) scale(1.1); }
        }
        .trophy-drop { animation: trophyDrop 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }
        .end-card { animation: endCardIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards; }
        .score-count { animation: scoreCount 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both; }
        .skull-shake { animation: skullShake 0.7s ease-in-out 0.2s both; }
        .confetti-piece { animation: confettiFall linear forwards; }

        @keyframes pageIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }

        .btn-spin:not(:disabled):hover { transform: scale(1.03) rotate(0.5deg); }
        .btn-spin:not(:disabled):active { transform: scale(0.96); }
        .btn-spin { transition: transform 0.15s ease, box-shadow 0.2s ease; }
    </style>

            const t = translations[lang];

            const wheelSegments = [100, 200, 300, 500, 0, 150, 250, 400, 600, 0, 350, 450];
            const keyboard = [['А','Б','В','Г','Д','Е','Ё','Ж','З'],['И','Й','К','Л','М','Н','О','Ө','П'],['Р','С','Т','У','Ү','Ф','Х','Ц','Ч'],['Ш','Щ','Ъ','Ы','Ь','Э','Ю','Я','Ң']];

            const playSound = (soundName) => {
                if (isMuted) return;
                const ctx = getAudioCtx();
                const master = ctx.createGain();

                const sounds = {
                    spin: () => {
                        // Whoosh sound
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(800, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.4);
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.4);
                    },
                    correct: () => {
                        // Happy ding
                        [523, 659, 784].forEach((freq, i) => {
                            const osc = ctx.createOscillator();

                            osc.frequency.value = freq;

                            gain.gain.setValueAtTime(0.2, t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                            osc.connect(gain); gain.connect(ctx.destination);

                        osc.frequency.value = 150;
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.3);
                    },
                    bankrupt: () => {
                        // Descending horror sound

                        const gain = ctx.createGain();

                            osc.connect(gain); gain.connect(ctx.destination);
                            osc.start(t); osc.stop(t + 0.5);

                    },
                    lose: () => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = 200;
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                        osc.connect(gain); gain.connect(ctx.destination);

                };

                if (sounds[soundName]) sounds[soundName]();
            };

            useEffect(() => { if (canvasRef.current && gameState === 'playing') drawWheel(0); }, [gameState]);

            // ✅ ИЗМЕНЕНИЕ 2: Enter крутит барабан
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (gameState !== 'playing') return;

                        if (!spinning && wheelValue === 0) spinWheel();

                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, guessedLetters, wheelValue, spinning, currentData]);

            const drawWheel = (rotation) => {
                const canvas = canvasRef.current; if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const centerX = 150, centerY = 150, radius = 140;
                const segmentAngle = (2 * Math.PI) / wheelSegments.length;
                ctx.clearRect(0, 0, 300, 300);

                wheelSegments.forEach((value, i) => {
                    const startAngle = i * segmentAngle + rotation;
                    const endAngle = startAngle + segmentAngle;
                    ctx.beginPath(); ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.fillStyle = value === 0 ? '#1f2937' : (i % 2 === 0 ? '#dc2626' : '#fbbf24');
                    ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(startAngle + segmentAngle / 2);
                    ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Montserrat';
                    ctx.fillText(value === 0 ? '💀' : value, radius * 0.7, 5); ctx.restore();
                });

                // Arrow pointing DOWN into the wheel, sitting above it
                const arrowTipX = centerX;
                const arrowTipY = centerY - radius + 2; // tip touches wheel edge
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.45)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 2;
                const grad = ctx.createLinearGradient(arrowTipX, arrowTipY - 28, arrowTipX, arrowTipY);
                grad.addColorStop(0, '#cc0000');
                grad.addColorStop(1, '#ff5555');
                ctx.beginPath();
                ctx.moveTo(arrowTipX, arrowTipY);           // tip (bottom, pointing into wheel)
                ctx.lineTo(arrowTipX + 10, arrowTipY - 16); // right wing
                ctx.lineTo(arrowTipX + 4, arrowTipY - 14);  // inner right
                ctx.lineTo(arrowTipX + 4, arrowTipY - 28);  // tail top right
                ctx.lineTo(arrowTipX - 4, arrowTipY - 28);  // tail top left
                ctx.lineTo(arrowTipX - 4, arrowTipY - 14);  // inner left
                ctx.lineTo(arrowTipX - 10, arrowTipY - 16); // left wing
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            };

            const spinWheel = () => {
                if (spinning) return;
                setSpinning(true); 
                setMessage(t.spinning);
                playSound('spin');

                const spins = 5 + Math.random() * 5;
                const finalRotation = spins * 2 * Math.PI;
                const duration = 3000;
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const currentRotation = finalRotation * (1 - Math.pow(1 - progress, 3));
                    drawWheel(currentRotation);
                    if (progress < 1) requestAnimationFrame(animate);
                    else {
                        const segmentAngle = (2 * Math.PI) / wheelSegments.length;
                        const normalizedRotation = finalRotation % (2 * Math.PI);
                        const arrowAngle = -Math.PI / 2; // top
                        let relativeAngle = (arrowAngle - normalizedRotation) % (2 * Math.PI);
                        if (relativeAngle < 0) relativeAngle += 2 * Math.PI;
                        const selectedIndex = Math.floor(relativeAngle / segmentAngle) % wheelSegments.length;
                        const value = wheelSegments[selectedIndex];
                        setWheelValue(value); setSpinning(false);
                        if (value === 0) {
                            playSound('bankrupt');
                            setMessage(t.bankrupt);
                            setTimeout(() => {
                                setLives(l => l > 1 ? (setWheelValue(0), setMessage(t.spinBtn), l - 1) : (setGameState('gameover'), 0));
                            }, 2000);
                        }
                    }
                };
                animate();
            };

            const startGame = () => {
                setCurrentWordIndex(Math.floor(Math.random() * wordsDatabase.length));
                setGuessedLetters([]); setScore(0); setScores([0,0]); setRound(1); setLives(3); setWheelValue(0); setMessage(t.spinBtn); setGameState('playing'); setShowExitConfirm(false); setCurrentPlayer(1);
                setTimeLeft(30); setTimerActive(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            // Start timer when wheel value is set
            useEffect(() => {
                if (wheelValue > 0 && gameState === 'playing') {
                    setTimeLeft(30);
                    setTimerActive(true);
                } else {
                    setTimerActive(false);
                    if (timerRef.current) clearInterval(timerRef.current);
                }
            }, [wheelValue, gameState]);

            // Timer countdown
            useEffect(() => {
                if (!timerActive) { if (timerRef.current) clearInterval(timerRef.current); return; }
                timerRef.current = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            clearInterval(timerRef.current);
                            setTimerActive(false);
                            setWheelValue(0);
                            setMessage(lang === 'kg' ? '⏰ Убакыт бүттү!' : '⏰ Время вышло!');
                            if (numPlayers === 2) setCurrentPlayer(p => p === 1 ? 2 : 1);
                            else setLives(l => l > 1 ? (setTimeout(() => setMessage(translations[lang].spinBtn), 1000), l - 1) : (setGameState('gameover'), 0));
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, [timerActive]);

            // Save score to leaderboard when game ends
            useEffect(() => {
                if (gameState === 'win' || gameState === 'gameover') {
                    const finalScore = numPlayers === 2 ? Math.max(scores[0], scores[1]) : score;
                    const name = numPlayers === 2
                        ? (scores[0] >= scores[1] ? playerName : player2Name)
                        : playerName;
                    if (name && finalScore > 0) {
                        const entry = { name, score: finalScore, date: new Date().toLocaleDateString() };
                        const updated = [...leaderboard, entry].sort((a,b) => b.score - a.score).slice(0, 10);
                        setLeaderboard(updated);
                        try { localStorage.setItem('bakyt_leaderboard', JSON.stringify(updated)); } catch {}
                    }
                }
            }, [gameState]);

            const useHint = () => {
                const word = currentData.word;
                const hidden = word.split('').filter(l => !guessedLetters.includes(l));
                if (hidden.length === 0) return;
                const penalty = 200;
                const currentScore = numPlayers === 2 ? scores[currentPlayer-1] : score;
                if (currentScore < penalty) {
                    setMessage(lang === 'kg' ? '⭐ Упай жетишсиз!' : '⭐ Недостаточно очков!');
                    setTimeout(() => setMessage(t.spinBtn), 1500);
                    return;
                }
                const randomLetter = hidden[Math.floor(Math.random() * hidden.length)];
                setGuessedLetters(g => [...g, randomLetter]);
                if (numPlayers === 2) {
                    setScores(s => { const ns = [...s]; ns[currentPlayer-1] -= penalty; return ns; });
                } else {
                    setScore(s => s - penalty);
                }
                setMessage(lang === 'kg' ? `⭐ "${randomLetter}" ачылды! −${penalty} упай` : `⭐ Открыта "${randomLetter}"! −${penalty} очков`);
                setTimeout(() => setMessage(wheelValue > 0 ? t.spinBtn : t.spinBtn), 1500);
            };

            const guessLetter = (letter) => {
                if (guessedLetters.includes(letter) || spinning || wheelValue === 0) return;
                const word = currentData.word;
                const newGuessed = [...guessedLetters, letter];
                setGuessedLetters(newGuessed);

                if (word.includes(letter)) {
                    playSound('correct');
                    const count = word.split('').filter(l => l === letter).length;
                    const earned = wheelValue * count;
                    if (numPlayers === 2) {
                        setScores(s => { const ns = [...s]; ns[currentPlayer-1] += earned; return ns; });
                    } else {
                        setScore(s => s + earned);
                    }
                    // Check if word is fully guessed
                    if (word.split('').every(l => newGuessed.includes(l))) {
                        playSound('win');
                        setMessage(t.correct);
                        setTimeout(() => {
                            if (round < 3) {
                                setRound(r => r + 1);
                                setCurrentWordIndex(Math.floor(Math.random() * wordsDatabase.length));
                                setGuessedLetters([]); setWheelValue(0); setTimerActive(false);
                                setMessage(t.winRound);
                            } else {
                                setGameState('win');
                            }
                        }, 2000);
                    } else {
                        // ✅ Correct: reset wheel, same player spins again
                        setWheelValue(0);
                        setTimerActive(false);
                        const spinAgainMsg = numPlayers === 2
                            ? (lang === 'kg'
                                ? `✅ ТУУРА! +${earned} упай — ${currentPlayer === 1 ? playerName : player2Name}, барабанды айлант!`
                                : `✅ ВЕРНО! +${earned} очков — ${currentPlayer === 1 ? playerName : player2Name}, крути снова!`)
                            : (lang === 'kg'
                                ? `✅ ТУУРА! +${earned} упай — барабанды айлант!`
                                : `✅ ВЕРНО! +${earned} очков — крути снова!`);
                        setMessage(spinAgainMsg);
                        setTimeout(() => setMessage(t.spinBtn), 1800);
                    }
                } else {
                    // ❌ Wrong: lose turn, switch player
                    playSound('lose');
                    setWheelValue(0);
                    setTimerActive(false);
                    if (numPlayers === 2) {
                        const nextName = currentPlayer === 1 ? player2Name : playerName;
                        setCurrentPlayer(p => p === 1 ? 2 : 1);
                        const wrongMsg = lang === 'kg'
                            ? `❌ КАТА! Кезек — ${nextName}`
                            : `❌ ОШИБКА! Ход переходит к ${nextName}`;
                        setMessage(wrongMsg);
                        setTimeout(() => setMessage(t.spinBtn), 1800);
                    } else {
                        setMessage(t.wrong);
                        setLives(l => l > 1
                            ? (setTimeout(() => setMessage(t.spinBtn), 1500), l - 1)
                            : (setGameState('gameover'), 0));
                    }
                }
            };

            const SoundToggle = () => (
                <button 
                    onClick={() => setIsMuted(!isMuted)} 
                    className="p-3 bg-white/10 hover:bg-white/20 rounded-xl backdrop-blur-md transition-all border border-white/20"
                    title={isMuted ? 'Включить звуки' : 'Выключить звуки'}
                >
                    {isMuted ? (
                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                        </svg>
                    ) : (
                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    )}
                </button>
            );

            const MusicToggle = () => (
                <button
                    onClick={() => setIsMusicOn(!isMusicOn)}
                    className={`p-3 rounded-xl backdrop-blur-md transition-all border ${isMusicOn ? 'bg-yellow-400/30 border-yellow-400/60 hover:bg-yellow-400/40' : 'bg-white/10 border-white/20 hover:bg-white/20'}`}
                    title={isMusicOn ? 'Выключить музыку' : 'Включить музыку'}
                >
                    <svg className={`w-6 h-6 ${isMusicOn ? 'text-yellow-300' : 'text-white'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                </button>
            );

            return (
                <>
                    {isLoading && <LoadingScreen lang={lang} onDone={() => setIsLoading(false)} />}

                    {gameState === 'menu' && (
                        <div className="menu-bg min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(135deg, #1e1b4b, #4c1d95, #7f1d1d, #1e1b4b)'}}>
                            {/* Leaderboard modal */}
                            {showLeaderboard && (
                                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                    <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full animate-modal">
                                        <h2 className="text-2xl font-black text-gray-800 mb-6 text-center">🏆 {lang === 'kg' ? 'Рекорддор' : 'Таблица рекордов'}</h2>
                                        {leaderboard.length === 0 ? (
                                            <p className="text-center text-gray-400 font-bold py-8">{lang === 'kg' ? 'Азырынча рекорд жок' : 'Рекордов пока нет'}</p>
                                        ) : (
                                            <div className="space-y-2 max-h-72 overflow-y-auto">
                                                {leaderboard.map((entry, i) => (
                                                    <div key={i} className={`flex items-center justify-between px-4 py-3 rounded-2xl ${i === 0 ? 'bg-yellow-50 border-2 border-yellow-300' : i === 1 ? 'bg-gray-50 border-2 border-gray-300' : i === 2 ? 'bg-orange-50 border-2 border-orange-300' : 'bg-indigo-50 border border-indigo-100'}`}>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-xl">{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`}</span>
                                                            <div>
                                                                <div className="font-black text-gray-800">{entry.name}</div>
                                                                <div className="text-xs text-gray-400">{entry.date}</div>
                                                            </div>
                                                        </div>
                                                        <div className="text-xl font-black text-indigo-600">{entry.score}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <div className="flex gap-3 mt-6">
                                            <button onClick={() => { setLeaderboard([]); try { localStorage.removeItem('bakyt_leaderboard'); } catch {} }} className="flex-1 py-3 bg-red-50 text-red-400 font-bold rounded-2xl hover:bg-red-100 transition-all text-sm">
                                                🗑 {lang === 'kg' ? 'Тазалоо' : 'Очистить'}
                                            </button>
                                            <button onClick={() => setShowLeaderboard(false)} className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all">
                                                ✓ {lang === 'kg' ? 'Жабуу' : 'Закрыть'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div className="float-orb absolute w-64 h-64 rounded-full top-10 left-10 pointer-events-none" style={{background:'radial-gradient(circle, rgba(251,191,36,0.3), transparent)', animationDuration:'7s'}} />
                            <div className="float-orb absolute w-48 h-48 rounded-full bottom-20 right-10 pointer-events-none" style={{background:'radial-gradient(circle, rgba(139,92,246,0.3), transparent)', animationDuration:'9s', animationDelay:'2s'}} />
                            <div className="menu-card bg-white rounded-[2rem] shadow-2xl p-8 max-w-md w-full text-center border-t-8 border-yellow-400" style={{boxShadow:'0 30px 80px rgba(0,0,0,0.4)'}}>
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <button onClick={() => setLang('kg')} className={`px-4 py-1 rounded-full text-sm font-bold transition-all duration-300 ${lang === 'kg' ? 'bg-blue-600 text-white scale-105 shadow-lg' : 'bg-gray-100 hover:bg-gray-200'}`}>КЫРГЫЗЧА</button>
                                        <button onClick={() => setLang('ru')} className={`px-4 py-1 rounded-full text-sm font-bold transition-all duration-300 ${lang === 'ru' ? 'bg-red-600 text-white scale-105 shadow-lg' : 'bg-gray-100 hover:bg-gray-200'}`}>РУССКИЙ</button>
                                    </div>
                                    <div className="flex gap-2">
                                        <SoundToggle />
                                        <MusicToggle />
                                    </div>
                                </div>
                                <h1 className="menu-title text-4xl font-black text-gray-800 mb-6 tracking-tighter italic">{t.title}</h1>
                                <div className="bg-orange-50 rounded-2xl p-6 mb-8 text-left border-l-4 border-orange-400">
                                    <h3 className="font-bold text-gray-800 mb-3">{t.rulesTitle}</h3>
                                    <ul className="space-y-2 text-gray-600 text-sm">
                                        {t.rules.map((r, i) => <li key={i} className="menu-rule-item flex gap-2" style={{animationDelay: (0.3 + i * 0.1) + 's'}}><span>•</span>{r}</li>)}
                                    </ul>
                                </div>
                                <button onClick={() => setGameState('setup')} className="w-full py-4 rounded-2xl text-xl font-bold shadow-xl uppercase transition-all duration-200 hover:scale-105 hover:shadow-2xl active:scale-95" style={{background:'linear-gradient(135deg, #fbbf24, #f97316)', color:'white', boxShadow:'0 8px 30px rgba(249,115,22,0.4)'}}>
                                    🎡 {t.startBtn}
                                </button>
                                <button onClick={() => setShowLeaderboard(true)} className="w-full mt-3 py-3 rounded-2xl font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition-all hover:scale-105 active:scale-95">
                                    🏆 {lang === 'kg' ? 'Рекорддор' : 'Таблица рекордов'}
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState === 'setup' && (
                        <div className="menu-bg min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(135deg, #1e1b4b, #4c1d95, #7f1d1d, #1e1b4b)'}}>
                            <div className="float-orb absolute w-64 h-64 rounded-full top-10 left-10 pointer-events-none" style={{background:'radial-gradient(circle, rgba(251,191,36,0.3), transparent)', animationDuration:'7s'}} />
                            <div className="float-orb absolute w-48 h-48 rounded-full bottom-20 right-10 pointer-events-none" style={{background:'radial-gradient(circle, rgba(139,92,246,0.3), transparent)', animationDuration:'9s', animationDelay:'2s'}} />
                            <div className="menu-card bg-white rounded-[2rem] shadow-2xl p-8 max-w-md w-full text-center border-t-8 border-yellow-400" style={{boxShadow:'0 30px 80px rgba(0,0,0,0.4)'}}>
                                <div className="text-5xl mb-3">🎮</div>
                                <h2 className="text-2xl font-black text-gray-800 mb-2">
                                    {lang === 'kg' ? 'Оюнчулардын саны' : 'Количество игроков'}
                                </h2>

                                {/* Player count toggle */}
                                <div className="flex gap-3 mb-6 justify-center">
                                    <button
                                        onClick={() => setNumPlayers(1)}
                                        className={`flex-1 py-3 rounded-2xl font-black text-lg transition-all duration-200 ${numPlayers === 1 ? 'text-white scale-105 shadow-lg' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}
                                        style={numPlayers === 1 ? {background:'linear-gradient(135deg,#4f46e5,#7c3aed)'} : {}}>
                                        👤 {lang === 'kg' ? '1 Оюнчу' : '1 Игрок'}
                                    </button>
                                    <button
                                        onClick={() => setNumPlayers(2)}
                                        className={`flex-1 py-3 rounded-2xl font-black text-lg transition-all duration-200 ${numPlayers === 2 ? 'text-white scale-105 shadow-lg' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}
                                        style={numPlayers === 2 ? {background:'linear-gradient(135deg,#059669,#047857)'} : {}}>
                                        👥 {lang === 'kg' ? '2 Оюнчу' : '2 Игрока'}
                                    </button>
                                </div>

                                {/* Player 1 input */}
                                <div className="mb-4 text-left">
                                    <label className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-2 block">
                                        👤 {lang === 'kg' ? '1-Оюнчунун аты' : 'Имя игрока 1'}
                                    </label>
                                    <input
                                        type="text"
                                        value={playerNameInput}
                                        onChange={e => setPlayerNameInput(e.target.value)}
                                        placeholder={lang === 'kg' ? 'Атыңыз...' : 'Ваше имя...'}
                                        maxLength={20}
                                        className="w-full border-2 border-indigo-200 focus:border-indigo-500 outline-none rounded-2xl px-5 py-3 text-lg font-bold text-gray-800 text-center transition-all"
                                        autoFocus
                                    />
                                </div>

                                {/* Player 2 input — only if 2 players selected */}
                                {numPlayers === 2 && (
                                    <div className="mb-4 text-left">
                                        <label className="text-xs font-black text-emerald-500 uppercase tracking-widest mb-2 block">
                                            👤 {lang === 'kg' ? '2-Оюнчунун аты' : 'Имя игрока 2'}
                                        </label>
                                        <input
                                            type="text"
                                            value={player2NameInput}
                                            onChange={e => setPlayer2NameInput(e.target.value)}
                                            placeholder={lang === 'kg' ? 'Атыңыз...' : 'Ваше имя...'}
                                            maxLength={20}
                                            className="w-full border-2 border-emerald-200 focus:border-emerald-500 outline-none rounded-2xl px-5 py-3 text-lg font-bold text-gray-800 text-center transition-all"
                                        />
                                    </div>
                                )}

                                <button
                                    onClick={() => {
                                        const n1 = playerNameInput.trim() || (lang === 'kg' ? 'Оюнчу 1' : 'Игрок 1');
                                        const n2 = player2NameInput.trim() || (lang === 'kg' ? 'Оюнчу 2' : 'Игрок 2');
                                        setPlayerName(n1);
                                        setPlayer2Name(n2);
                                        startGame();
                                    }}
                                    disabled={!playerNameInput.trim() || (numPlayers === 2 && !player2NameInput.trim())}
                                    className="w-full mt-2 py-4 rounded-2xl text-xl font-bold shadow-xl uppercase transition-all duration-200 hover:scale-105 hover:shadow-2xl active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed disabled:scale-100"
                                    style={{background:'linear-gradient(135deg, #fbbf24, #f97316)', color:'white', boxShadow:'0 8px 30px rgba(249,115,22,0.4)'}}>
                                    🎡 {lang === 'kg' ? 'Баштоо!' : 'Начать!'}
                                </button>
                                <button onClick={() => setGameState('menu')} className="w-full mt-3 py-3 rounded-2xl font-bold text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all">
                                    ← {lang === 'kg' ? 'Артка' : 'Назад'}
                                </button>
                            </div>
                        </div>
                    )}

                    {(gameState === 'gameover' || gameState === 'win') && (
                        <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style={{background: gameState === 'win' ? 'linear-gradient(135deg,#064e3b,#065f46,#14532d)' : 'linear-gradient(135deg,#1f2937,#111827,#0f172a)'}}>
                            {/* Confetti for win */}
                            {gameState === 'win' && [...Array(30)].map((_, i) => (
                                <div key={i} className="confetti-piece absolute pointer-events-none rounded-sm" style={{
                                    width: Math.random()*10+6+'px', height: Math.random()*10+6+'px',
                                    left: Math.random()*100+'%', top: '-20px',
                                    background: ['#fbbf24','#ef4444','#3b82f6','#10b981','#f97316','#a855f7'][i%6],
                                    animationDuration: (Math.random()*2+2)+'s',
                                    animationDelay: (Math.random()*1.5)+'s',
                                    opacity: 0,
                                }}/>
                            ))}
                            <div className="end-card bg-white rounded-[2.5rem] p-8 max-w-md w-full text-center relative z-10" style={{boxShadow:'0 40px 100px rgba(0,0,0,0.5)'}}>
                                <div className={`text-8xl mb-4 inline-block ${gameState === 'win' ? 'trophy-drop' : 'skull-shake'}`}>{gameState === 'win' ? '🏆' : '💀'}</div>
                                <h1 className={`text-4xl font-black mb-4 ${gameState === 'win' ? 'text-green-600' : 'text-red-600'}`} style={{textShadow: gameState==='win'?'0 2px 20px rgba(16,185,129,0.3)':'0 2px 20px rgba(239,68,68,0.3)'}}>{gameState === 'win' ? t.winGame : t.gameOver}</h1>
                                {numPlayers === 2 ? (
                                    <div className="mb-4">
                                        <div className="text-lg font-black text-gray-700 mb-3">
                                            🏆 {lang === 'kg' ? 'Жеңүүчү:' : 'Победитель:'} {scores[0] > scores[1] ? playerName : scores[1] > scores[0] ? player2Name : (lang === 'kg' ? 'Тең!' : 'Ничья!')}
                                        </div>
                                        <div className="flex gap-3">
                                            <div className="flex-1 bg-indigo-50 rounded-2xl p-3 border-2 border-indigo-100">
                                                <div className="text-xs font-bold text-indigo-400 uppercase">👤 {playerName}</div>
                                                <div className="text-3xl font-black text-indigo-600">{scores[0]}</div>
                                            </div>
                                            <div className="flex-1 bg-emerald-50 rounded-2xl p-3 border-2 border-emerald-100">
                                                <div className="text-xs font-bold text-emerald-500 uppercase">👤 {player2Name}</div>
                                                <div className="text-3xl font-black text-emerald-600">{scores[1]}</div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    playerName && <div className="text-lg font-bold text-gray-500 mb-2">👤 {playerName}</div>
                                )}
                                <p className="text-gray-500 mb-2 font-medium">{t.wordWas}</p>
                                <div className="text-3xl font-black text-indigo-900 mb-6 tracking-widest bg-indigo-50 rounded-2xl py-3">{wordsDatabase[currentWordIndex][lang].word}</div>
                                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl p-6 mb-8 border-2 border-indigo-100">
                                    <div className="score-count text-6xl font-black text-indigo-600">{score}</div>
                                    <div className="text-sm font-bold text-indigo-400 uppercase tracking-widest mt-1">{t.totalScore}</div>
                                </div>
                                <button onClick={startGame} className="w-full py-4 rounded-2xl font-bold text-lg text-white transition-all duration-200 hover:scale-105 active:scale-95" style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)', boxShadow:'0 8px 30px rgba(79,70,229,0.4)'}}>🔄 {t.playAgain}</button>
                            </div>
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="min-h-screen bg-indigo-950 p-4 relative overflow-hidden flex flex-col items-center page-in">
                            {/* floating bg orbs */}
                            <div className="float-orb absolute w-96 h-96 rounded-full -top-20 -left-20 pointer-events-none" style={{background:'radial-gradient(circle, rgba(99,102,241,0.15), transparent)', animationDuration:'10s'}} />
                            <div className="float-orb absolute w-80 h-80 rounded-full -bottom-10 -right-10 pointer-events-none" style={{background:'radial-gradient(circle, rgba(251,191,36,0.1), transparent)', animationDuration:'13s', animationDelay:'3s'}} />

                            {showExitConfirm && (
                                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                    <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full animate-modal text-center">
                                        <h2 className="text-2xl font-black text-gray-800 mb-2">{t.exitTitle}</h2>
                                        <p className="text-gray-500 mb-8">{t.exitText}</p>
                                        <button onClick={() => setGameState('menu')} className="w-full py-4 bg-red-600 text-white font-bold rounded-xl mb-3 hover:bg-red-700 transition-all hover:scale-105 active:scale-95">{t.exitYes}</button>
                                        <button onClick={() => setShowExitConfirm(false)} className="w-full py-4 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-all hover:scale-105 active:scale-95">{t.exitNo}</button>
                                    </div>
                                </div>
                            )}

                            <div className="w-full max-w-4xl relative z-10">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowExitConfirm(true)} className="bg-white/10 hover:bg-white/25 text-white px-5 py-2 rounded-xl font-bold backdrop-blur-md transition-all hover:scale-105 active:scale-95 border border-white/10">{t.exitBtn}</button>
                                        <SoundToggle />
                                        <MusicToggle />
                                    </div>
                                    <div className="flex gap-2">
                                        {[...Array(3)].map((_, i) => (
                                            <span key={i} className={`text-2xl transition-all duration-500 ${i < lives ? 'opacity-100 scale-100' : 'opacity-20 scale-75'}`} style={{filter: i < lives ? 'drop-shadow(0 0 6px rgba(239,68,68,0.7))' : 'none'}}>❤️</span>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-2xl p-6 md:p-10" style={{boxShadow:'0 25px 80px rgba(0,0,0,0.4)'}}>
                                    <div className="flex justify-between items-end mb-8">
                                        <div>
                                            <div className="text-xs font-bold text-gray-400 uppercase tracking-tighter">{t.round}</div>
                                            <div className="text-3xl font-black text-indigo-600">{round} / 3</div>
                                        </div>
                                        {numPlayers === 2 ? (
                                            <div className="flex gap-3">
                                                <div className={`px-4 py-2 rounded-2xl text-center transition-all duration-300 ${currentPlayer === 1 ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}>
                                                    <div className="text-xs font-bold uppercase tracking-wide">👤 {playerName}</div>
                                                    <div className="text-2xl font-black">{scores[0]}</div>
                                                    {currentPlayer === 1 && <div className="text-xs font-bold">▶ {lang === 'kg' ? 'Кезек' : 'Ход'}</div>}
                                                </div>
                                                <div className={`px-4 py-2 rounded-2xl text-center transition-all duration-300 ${currentPlayer === 2 ? 'bg-emerald-600 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}>
                                                    <div className="text-xs font-bold uppercase tracking-wide">👤 {player2Name}</div>
                                                    <div className="text-2xl font-black">{scores[1]}</div>
                                                    {currentPlayer === 2 && <div className="text-xs font-bold">▶ {lang === 'kg' ? 'Кезек' : 'Ход'}</div>}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center">
                                                {playerName && <div className="text-sm font-black text-indigo-400 uppercase tracking-widest">👤 {playerName}</div>}
                                            </div>
                                        )}
                                        <div className="text-right">
                                            <div className="text-4xl font-black text-orange-500" style={{textShadow:'0 2px 10px rgba(249,115,22,0.3)'}}>{numPlayers === 2 ? scores[currentPlayer-1] : score}</div>
                                            <div className="text-xs font-bold text-gray-400 uppercase tracking-tighter">{t.score}</div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border-2 border-indigo-100 rounded-3xl p-6 mb-8 text-center">
                                        <div className="text-xs font-black text-indigo-300 uppercase mb-1 tracking-widest">{t.category}: {currentData.category}</div>
                                        <div className="text-xl font-bold text-indigo-900 italic">" {currentData.hint} "</div>
                                        {/* Timer */}
                                        {timerActive && (
                                            <div className={`mt-3 inline-flex items-center gap-2 px-4 py-2 rounded-full font-black text-lg ${timeLeft <= 10 ? 'bg-red-500 text-white animate-pulse' : 'bg-indigo-100 text-indigo-700'}`}>
                                                ⏱ {timeLeft}s
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex justify-center gap-2 mb-10 flex-wrap">
                                        {currentData.word.split('').map((letter, index) => (
                                            <div key={`${letter}-${index}`} className={`w-10 h-14 md:w-14 md:h-20 rounded-xl flex items-center justify-center border-b-8 transition-all duration-300 ${guessedLetters.includes(letter) ? 'bg-indigo-600 border-indigo-800 letter-reveal' : 'bg-gray-100 border-gray-300 hover:bg-gray-200'}`} style={guessedLetters.includes(letter) ? {boxShadow:'0 4px 20px rgba(79,70,229,0.4)', animationDelay: index * 0.05 + 's'} : {}}>
                                                <span className={`text-2xl md:text-4xl font-black text-white transition-all duration-300 ${guessedLetters.includes(letter) ? 'opacity-100' : 'opacity-0'}`}>{letter}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex flex-col lg:flex-row items-center justify-around gap-10">
                                        <div className="relative wheel-glow rounded-full">
                                            <canvas ref={canvasRef} width="300" height="300" className="drop-shadow-2xl rounded-full"></canvas>
                                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5 bg-white rounded-full shadow-lg border-2 border-indigo-200"></div>
                                        </div>

                                        <div className="flex flex-col items-center gap-6 w-full max-w-sm">
                                            <button onClick={spinWheel} disabled={spinning || wheelValue !== 0}
                                                className={`btn-spin w-full py-5 rounded-[1.5rem] text-xl font-black shadow-xl ${spinning || wheelValue !== 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'spin-btn-idle text-white'}`}
                                                style={spinning || wheelValue !== 0 ? {} : {background:'linear-gradient(135deg,#34d399,#059669)', boxShadow:'0 8px 30px rgba(5,150,105,0.4)'}}>
                                                {spinning ? '🌀 ' + t.spinning : '🎡 ' + t.spinBtn}
                                            </button>

                                            {/* Hint button */}
                                            <button onClick={useHint}
                                                disabled={currentData.word.split('').every(l => guessedLetters.includes(l))}
                                                className="w-full py-3 rounded-2xl font-black text-base transition-all duration-200 hover:scale-105 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed text-white"
                                                style={{background:'linear-gradient(135deg,#a855f7,#7c3aed)', boxShadow:'0 4px 20px rgba(168,85,247,0.4)'}}>
                                                ⭐ {lang === 'kg' ? 'Жардам (−200 упай)' : 'Подсказка (−200 очков)'}
                                            </button>

                                            <div className={`message-in w-full text-center py-4 rounded-2xl font-black text-lg transition-all duration-300 ${wheelValue > 0 ? 'text-gray-900' : 'bg-gray-100 text-indigo-300'}`}
                                                style={wheelValue > 0 ? {background:'linear-gradient(135deg,#fbbf24,#f59e0b)', boxShadow:'0 4px 20px rgba(251,191,36,0.5)'} : {}}>
                                                {message}
                                            </div>

                                            <div className="grid grid-cols-9 gap-1 w-full">
                                                {keyboard.flat().map((letter) => {
                                                    const isGuessed = guessedLetters.includes(letter);
                                                    const isInWord = currentData.word.includes(letter);
                                                    const canClick = !isGuessed && wheelValue !== 0 && !spinning;
                                                    return (
                                                        <button key={letter} onClick={() => guessLetter(letter)} disabled={isGuessed || wheelValue === 0 || spinning}
                                                            className={`aspect-square rounded-lg text-sm font-bold transition-all duration-200 ${isGuessed ? (isInWord ? 'bg-green-500 text-white scale-95' : 'bg-red-100 text-red-400 scale-90 opacity-60') : (canClick ? 'bg-white border-2 border-gray-100 text-indigo-600 hover:border-indigo-400 hover:scale-110 hover:shadow-md active:scale-90' : 'bg-gray-50 text-gray-200 cursor-not-allowed')}`}
                                                            style={isGuessed && isInWord ? {boxShadow:'0 2px 8px rgba(34,197,94,0.4)'} : {}}>
                                                            {letter}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        ReactDOM.render(<KyrgyzWheelGame />, document.getElementById('root'));
    </script>
</body>
</html>
